<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="/frontend/css/custom.css" rel="stylesheet"/>
<title>Sign Up | bAIsed</title>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col transition-colors duration-300 dark:bg-zinc-950 dark:text-zinc-100" data-page="signup">
<header class="fixed top-0 z-50 w-full border-b border-slate-200 bg-white/85 backdrop-blur-md transition-colors duration-300 dark:border-zinc-800 dark:bg-black/85">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
    <div class="flex items-center gap-8">
      <a class="text-2xl font-black tracking-tighter text-teal-600" href="/">bAIsed</a>
      <nav class="hidden items-center gap-6 md:flex">
        <a class="text-sm font-medium text-slate-600 transition-colors hover:text-teal-600 dark:text-zinc-400 dark:hover:text-teal-400" href="/solutions">Solutions</a>
        <a class="text-sm font-medium text-slate-600 transition-colors hover:text-teal-600 dark:text-zinc-400 dark:hover:text-teal-400" href="/workbench">Workbench</a>
        <a class="text-sm font-medium text-slate-600 transition-colors hover:text-teal-600 dark:text-zinc-400 dark:hover:text-teal-400" href="/methodology">Methodology</a>
        <a class="text-sm font-medium text-slate-600 transition-colors hover:text-teal-600 dark:text-zinc-400 dark:hover:text-teal-400" href="/docs">Docs</a>
        <a class="text-sm font-medium text-slate-600 transition-colors hover:text-teal-600 dark:text-zinc-400 dark:hover:text-teal-400" href="/about">About</a>
      </nav>
    </div>
    <div class="flex items-center gap-3" data-auth-container>
      <a class="hidden rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 md:block" href="/case-study">Impact Reports</a>
      <a class="hidden rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 md:block" href="/login">Sign In</a>
      <a class="rounded-lg border-b-2 border-teal-600 bg-black px-4 py-2 text-sm font-semibold text-white" href="/signup">Sign Up</a>
    </div>
  </div>
</header>
<main class="flex-grow flex items-center justify-center px-container-margin py-xl">
<div class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest dark:bg-zinc-900 border border-outline-variant dark:border-zinc-800 p-xl shadow-sm rounded-xl transition-colors">
<div class="flex flex-col gap-sm mb-lg">
<h1 class="font-h2 text-h2 text-on-surface dark:text-white">Create your account</h1>
<p class="font-body-md text-body-md text-on-surface-variant dark:text-zinc-400">Set up your bAIsed workspace for fairness analysis and reporting.</p>
</div>
<form class="space-y-lg" id="signup-form">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-zinc-400" for="signup-name">FULL NAME</label>
<input class="w-full px-md py-sm bg-surface-container-lowest dark:bg-zinc-800 border border-outline-variant dark:border-zinc-700 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none font-body-md text-body-md text-on-surface dark:text-white rounded-lg" id="signup-name" placeholder="Jane Doe" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-zinc-400" for="signup-email">WORK EMAIL</label>
<input class="w-full px-md py-sm bg-surface-container-lowest dark:bg-zinc-800 border border-outline-variant dark:border-zinc-700 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none font-body-md text-body-md text-on-surface dark:text-white rounded-lg" id="signup-email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-zinc-400" for="signup-password">PASSWORD</label>
<input class="w-full px-md py-sm bg-surface-container-lowest dark:bg-zinc-800 border border-outline-variant dark:border-zinc-700 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none font-body-md text-body-md text-on-surface dark:text-white rounded-lg" id="signup-password" placeholder="Create a password" type="password"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-zinc-400" for="signup-confirm-password">CONFIRM PASSWORD</label>
<input class="w-full px-md py-sm bg-surface-container-lowest dark:bg-zinc-800 border border-outline-variant dark:border-zinc-700 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none font-body-md text-body-md text-on-surface dark:text-white rounded-lg" id="signup-confirm-password" placeholder="Re-enter your password" type="password"/>
</div>
<button class="w-full bg-primary dark:bg-teal-600 py-md font-h3 text-h3 text-on-primary hover:opacity-90 transition-all active:scale-[0.98] duration-150 flex justify-center items-center gap-sm rounded-lg" type="submit">
  Sign Up
  <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<p class="mt-4 text-sm text-on-surface-variant dark:text-zinc-500" id="signup-status">Firebase sign-up will be connected in the next auth pass.</p>
</div>
</div>
</main>
<script src="/frontend/js/site.js"></script>
<script src="/frontend/js/firebase-config.js"></script>
<script src="/frontend/js/auth.js"></script>
<script>
document.getElementById("signup-form")?.addEventListener("submit", async (event) => {
  event.preventDefault();
  const name = document.getElementById("signup-name")?.value || "";
  const email = document.getElementById("signup-email")?.value || "";
  const password = document.getElementById("signup-password")?.value || "";
  const confirmPassword = document.getElementById("signup-confirm-password")?.value || "";
  const status = document.getElementById("signup-status");

  try {
    await window.baisedAuth.signUpWithEmail(name, email, password, confirmPassword);
  } catch (error) {
    if (status) {
      status.textContent = error.message;
    }
  }
});
</script>
</body>
</html>
